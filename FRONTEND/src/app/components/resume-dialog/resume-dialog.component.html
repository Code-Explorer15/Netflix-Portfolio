<div class="resume-dialog">
  <div class="resume-toolbar">
    <button mat-button type="button" (click)="onClose()">Close</button>
    <span class="resume-toolbar-spacer"></span>
    <button mat-button type="button" (click)="openInNewTab()">Open in new tab</button>
    <button mat-button type="button" (click)="downloadResume()">Download</button>
  </div>

  <div class="resume-body">
    <div *ngIf="loading" class="resume-state resume-loading">Loading resume…</div>

    <div *ngIf="!loading && loadError" class="resume-state resume-error">
      <p>The resume could not be shown in the viewer.</p>
      <p class="resume-error-detail">
        Add your PDF under <code>src/assets/resume/</code> with the name set in
        <code>resume.constants.ts</code>, or use Open / Download below.
      </p>
      <div class="resume-error-actions">
        <button mat-raised-button type="button" (click)="openInNewTab()">Open in new tab</button>
        <button mat-button type="button" (click)="downloadResume()">Download</button>
      </div>
    </div>

    <div *ngIf="!loading && !loadError && safeIframeSrc" class="resume-viewer">
      <iframe
        [src]="safeIframeSrc"
        title="Resume PDF"
        width="100%"
        height="100%"
        class="resume-iframe"
      ></iframe>
    </div>
  </div>
</div>
